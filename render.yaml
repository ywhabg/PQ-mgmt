services:
  - type: web
    name: dpqms-api
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: "./build.sh"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi:app
      - key: DATABASE_URL
        fromDatabase:
          name: dpqms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: dpqms-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.onrender.com,https://dpqms-api.onrender.com
      - key: LOG_LEVEL
        value: INFO

  - type: redis
    name: dpqms-redis
    plan: starter
    ipAllowList: []

databases:
  - name: dpqms-db
    databaseName: dpqms
    user: dpqms_user
    plan: starter
